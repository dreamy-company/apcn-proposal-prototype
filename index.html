<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="APCN 2027 — 18th Asian Pacific Congress of Nephrology, Nusa Dua, Bali · 9–11 December 2027 · e-Pocket Book">
<title>APCN 2027 — e-Pocket Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/book.css">
<link rel="stylesheet" href="css/pages.css">
<link rel="stylesheet" href="css/ui.css">
<link rel="stylesheet" href="css/print.css">
</head>

<body class="stage">


  <div class="brandmark">
    <img src="assets/images/apcn-logo.png" alt="APCN & AM InaSN 2027, Bali">
  </div>

  <div class="msearch">
    <span class="msearch__ico" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4-4"/></svg>
    </span>
    <input type="text" placeholder="Search sessions, speakers, rooms…" aria-label="Search">
    <div class="msearch__results"></div>
  </div>

  <div class="book-wrap">
    <div class="book" id="book"></div>
  </div>

  <div class="mnav" aria-label="Page navigation"></div>

  <div class="dock">
    <div class="nav" aria-label="Sections"></div>
    <div class="tools" aria-label="Book controls"></div>
  </div>

  <div class="scrub">
    <div class="scrub__track"><div class="scrub__fill"></div><div class="scrub__thumb"></div></div>
    <div class="scrub__label">1/24</div>
  </div>

  <!-- overlays -->
  <div class="overlay" id="search-overlay">
    <div class="search-box">
      <input type="text" placeholder="Search sessions, speakers, exhibitors, rooms…" aria-label="Search">
      <div class="search-results"></div>
    </div>
  </div>
  <div class="zoom-view" id="zoom-overlay"><div class="zoom-view__inner"></div></div>
  <div class="toast" id="toast"></div>
  <div class="notif" id="notif">
    <span class="notif__dot"></span>
    <span class="notif__text"></span>
    <button class="notif__go">View</button>
    <button class="notif__x" aria-label="Dismiss">×</button>
  </div>

  <div id="live" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)"></div>

  <script src="js/vendor/page-flip.browser.js"></script>
  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/flipbook.js"></script>
  <script src="js/controls.js"></script>
</body>
</html>
